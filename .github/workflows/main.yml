name: CI Flutter + Go

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar repo
    - name: Checkout
      uses: actions/checkout@v4

    # =====================
    # 🔵 BACKEND GO
    # =====================
    - name: Instalar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build backend
      run: |
        cd backend
        go mod tidy
        go build ./...

    # =====================
    # 🔵 FRONTEND FLUTTER
    # =====================
    - name: Instalar Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Instalar dependencias Flutter
      run: |
        cd frontend
        flutter pub get

    - name: Analizar código Flutter
      run: |
        cd frontend
        flutter analyze

    - name: Build Flutter Web
      run: |
        cd frontend
        flutter build web
